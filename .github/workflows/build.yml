name: Build Windows EXE

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Install dependencies
      run: |
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --name "PLB Generator" padsleadsbasslingeneratorv5.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: PLB-Generator-Windows
        path: dist/*.exe
